<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Automated Videos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>Automated Videos</h1>
        </header>

        <!-- LEFT: Upload + Download -->
        <div>
            <section class="card">
                <h2>Upload Video</h2>
                <div class="form-group">
                    <label for="videoInput">Choose video file</label>
                    <input type="file" id="videoInput" accept="video/*" multiple />
                </div>
                <button id="uploadBtn">Upload to Supabase</button>

                <!-- Progress bar -->
                <div class="progress-wrapper">
                    <div class="progress-bar-container">
                        <div id="progressBar"></div>
                    </div>
                </div>

                <div id="uploadStatus" class="status"></div>
                <hr>
                <!-- </section>
            
            <section class="card"> -->
                <h2>Download Video</h2>
                <div class="form-group">
                    <label for="filePathInput">File names (comma separated, e.g. a.mp4, b.mp4)</label>
                    <!-- <input type="text" id="filePathInput" placeholder="a.mp4, b.mp4" /> -->
                    <textarea id="filePathInput" placeholder="video1.mp4
video2.mp4
video3.mp4" style="
    width:100%;
    height:120px;
    padding:10px 12px;
    border:1px solid #dee2e6;
    border-radius:6px;
    font-size:0.95rem;
    resize:none;            /* not draggable */
    overflow-y:auto;        /* vertical scrollbar when needed */
  "></textarea>
                </div>
                <button id="downloadBtn">Download Video</button>
                <div id="downloadStatus" class="status"></div>
            </section>
        </div>

        <!-- RIGHT: Stats + Search -->
        <div>
            <section class="card">
                <h2>Video Stats</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div id="totalCount" class="stat-number">0</div>
                        <div class="stat-label">Total Videos</div>
                    </div>
                </div>
                <hr>
                <!-- </section>

            <section class="card"> -->
                <h2>Search Video</h2>
                <div class="form-group">
                    <label for="searchInput">Search by filename</label>
                    <input type="text" id="searchInput" placeholder="Enter filename..." />
                </div>
                <button id="searchBtn">Search</button>
                <div id="searchResult" class="search-result" style="display:none;"></div>
            </section>
        </div>
        <footer style="text-align:center; margin-bottom: 20px; color:var(--text-muted); font-size:0.85rem;">
            Powered by Shashank Sharma
        </footer>
    </div>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- Your custom JS -->
    <script type="module" src="script.js"></script>
</body>

</html>
