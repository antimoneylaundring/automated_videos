<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Automated Videos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style src="style.css"></style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Automated Videos</h1>
        </header>

        <!-- LEFT: Upload + Download -->
        <div>
            <section class="card">
                <h2>Upload Video</h2>
                <div class="form-group">
                    <label for="videoInput">Choose video file</label>
                    <input type="file" id="videoInput" accept="video/*" multiple />
                </div>
                <button id="uploadBtn">Upload to Supabase</button>

                <!-- Progress bar -->
                <div class="progress-wrapper">
                    <div class="progress-bar-container">
                        <div id="progressBar"></div>
                    </div>
                    <div id="progressText">Ready</div>
                </div>

                <div id="uploadStatus" class="status"></div>
                <hr>
            <!-- </section>
            
            <section class="card"> -->
                <h2>Download Video</h2>
                <div class="form-group">
                    <label for="filePathInput">File name (e.g. myvideo.mp4)</label>
                    <input type="text" id="filePathInput" placeholder="myvideo.mp4" />
                </div>
                <button id="downloadBtn">Download Video</button>
                <div id="downloadStatus" class="status"></div>
            </section>
        </div>

        <!-- RIGHT: Stats + Search -->
        <div>
            <section class="card">
                <h2>Video Stats</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div id="totalCount" class="stat-number">0</div>
                        <div class="stat-label">Total Videos</div>
                    </div>
                </div>
                <hr>
            <!-- </section>

            <section class="card"> -->
                <h2>Search Video</h2>
                <div class="form-group">
                    <label for="searchInput">Search by filename</label>
                    <input type="text" id="searchInput" placeholder="Enter filename..." />
                </div>
                <button id="searchBtn">Search</button>
                <div id="searchResult" class="search-result" style="display:none;"></div>
            </section>
        </div>
        <footer style="text-align:center; margin-top:30px; color:var(--text-muted); font-size:0.85rem;">
            Powered by Shashank Sharma
        </footer>
    </div>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Your custom JS -->
    <script type="module" src="script.js"></script>
</body>

</html>
